<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mack Bulldog - 3D Viewer</title>
<script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
<style>
  html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;background:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  #scene{position:fixed;inset:0;z-index:0}
  .s-black{background:#000}
  .caret{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(66vw,90vh);opacity:.92;pointer-events:none}
  model-viewer{position:fixed;inset:0;width:100vw;height:100vh;z-index:1;background:transparent}

  .hint{position:fixed;left:24px;bottom:24px;z-index:10;
    background:rgba(20,23,28,.82);color:#e7eaf0;border:1px solid #3c434f;height:44px;padding:0 16px;border-radius:11px;
    font-size:13px;font-weight:500;backdrop-filter:blur(6px);pointer-events:none;
    display:flex;align-items:center;gap:8px;letter-spacing:.2px}
  .hint svg{width:16px;height:16px}
  .hint .hg{display:inline-flex;align-items:center;gap:6px}
  .hint .dot{opacity:.5}
  .hint.hide{opacity:0}
  .brand{position:fixed;top:96px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none}
  .brand img{width:340px;height:auto;opacity:.9;display:block}
  .panel{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:10px;align-items:center;z-index:10}
  .designation{text-align:center;white-space:nowrap}
  .designation .dname{font-size:14px;font-weight:700;letter-spacing:.3px;color:#fff}
  .finishes{display:flex;gap:16px;padding:2px}
  .fsw{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;background:none;border:none;padding:0}
  .fsw .dog{width:48px;height:50px;opacity:.8;transition:filter .15s,transform .1s,opacity .15s;
    -webkit-mask:url(assets/bulldog.png) center/contain no-repeat; mask:url(assets/bulldog.png) center/contain no-repeat}
  .fsw:hover .dog{transform:scale(1.08);opacity:1}
  .fsw.active .dog{opacity:1;filter:drop-shadow(0 0 6px #d81f27)}
  .ar-cta{position:fixed;top:150px;left:50%;transform:translateX(-50%);z-index:11;
    display:flex;align-items:center;gap:8px;cursor:pointer;
    background:#d81f27;color:#fff;border:none;padding:12px 20px;border-radius:26px;
    font-size:14px;font-weight:700;letter-spacing:.2px;box-shadow:0 6px 20px rgba(216,31,39,.4)}
  .ar-cta:hover{background:#c01421}
  .ar-note{display:none;position:fixed;top:150px;left:50%;transform:translateX(-50%);z-index:11;
    background:rgba(20,23,28,.85);border:1px solid #3c434f;color:#c4c9d2;backdrop-filter:blur(6px);
    padding:10px 16px;border-radius:12px;font-size:12.5px;max-width:82vw;text-align:center}
  .ar-cta svg{width:19px;height:19px}
  .utils{position:fixed;bottom:24px;right:24px;display:flex;gap:8px;z-index:10}
  .ubtn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;
    background:rgba(20,23,28,.82);border:1px solid #3c434f;border-radius:11px;backdrop-filter:blur(6px);
    color:#e7eaf0;transition:background .15s,border-color .15s}
  .ubtn:hover{background:#3a4150}
  .ubtn svg{width:20px;height:20px}
  .ubtn.active{background:#d81f27;border-color:#d81f27;color:#fff}
</style>
</head>
<body>
  <div id="scene" class="s-black"><img class="caret" src="assets/pinnacle-caret.svg" alt=""></div>

  <model-viewer id="mv" src="assets/mack-gold.glb"
    camera-controls touch-action="pan-y"
    auto-rotate auto-rotate-delay="0"
    shadow-intensity="1" exposure="1.0"
    environment-image="neutral"
    camera-orbit="0deg 78deg auto"
    interaction-prompt="none"
    ar ar-modes="webxr scene-viewer quick-look" ar-scale="auto" ar-placement="floor">
    <button slot="ar-button" id="ar-btn" class="ar-cta">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 3 7v10l9 5 9-5V7z"/><path d="M3 7l9 5 9-5"/><path d="M12 12v10"/></svg>
      View Mack in your space
    </button>
  </model-viewer>

  <div class="ar-note" id="ar-note">AR needs a supported phone browser — open this page in Safari (iPhone) or Chrome (Android).</div>


  <div class="brand"><img src="assets/pinnacle-logo.svg" alt="Logo"></div>

  <div class="panel">
    <div class="finishes" id="finishes"></div>
    <div class="designation" id="desig"><div class="dname"></div></div>
  </div>

  <div class="hint" id="hint">
    <span class="hg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 3v4h4"/></svg> Drag to spin</span>
    <span class="dot">&middot;</span>
    <span class="hg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg> Scroll to zoom</span>
  </div>

  <div class="utils">
    <button class="ubtn active" id="rot" title="Auto-rotate">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 3v4h4"/></svg>
    </button>
    <button class="ubtn" id="reset" title="Reset view">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2.5"/><circle cx="12" cy="12" r="2.4"/></svg>
    </button>
    <button class="ubtn" id="fs" title="Fullscreen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
    </button>
  </div>

<script>
  const mv=document.getElementById('mv');

  // ---- finish variations (each is its own baked metal model) ----
  const finishes=[
    {id:'gold',  n:'Gold',       src:'assets/mack-gold.glb',   sw:'linear-gradient(135deg,rgb(221, 206, 173) 0%,rgb(191, 169, 113) 48%,rgb(121, 106, 69) 100%)'},
    {id:'silver',n:'Silver',     src:'assets/mack-silver.glb', sw:'linear-gradient(135deg,rgb(218, 219, 220) 0%,rgb(187, 188, 189) 48%,rgb(118, 118, 119) 100%)'},
    {id:'copper',n:'Copper',     src:'assets/mack-copper.glb', sw:'linear-gradient(135deg,rgb(199, 177, 164) 0%,rgb(158, 120, 93) 48%,rgb(99, 74, 56) 100%)'},
    {id:'black', n:'Blk Chrome', src:'assets/mack-black.glb',  sw:'linear-gradient(135deg,rgb(168, 168, 171) 0%,rgb(102, 102, 108) 48%,rgb(62, 62, 66) 100%)'},
  ];
  const infos={
    gold:  {t:'Gold · Purebred Mack'},
    silver:{t:'Chrome · Factory Standard'},
    copper:{t:'Copper · Electric'},
    black: {t:'Black · Limited Edition'},
  };
  let current=finishes[0];
  function applyFinish(f){
    current=f;
    const dz=document.getElementById('desig');
    if(dz&&infos[f.id]) dz.querySelector('.dname').textContent=infos[f.id].t;
    if(mv.getAttribute('src')!==f.src) mv.setAttribute('src', f.src);  // swaps model -> AR uses this finish
  }
  applyFinish(current);
  mv.addEventListener('load',()=>{
    const note=document.getElementById('ar-note');
    const touch=window.matchMedia('(pointer:coarse)').matches;
    if(note) note.style.display=(touch && !mv.canActivateAR)?'block':'none';
  },{once:true});
  const fcont=document.getElementById('finishes');
  finishes.forEach((f,i)=>{
    const el=document.createElement('button');
    el.className='fsw'+(i===0?' active':'');
    el.title=f.n;
    const dog=document.createElement('span'); dog.className='dog'; dog.style.background=f.sw;
    el.appendChild(dog);
    el.onclick=()=>{applyFinish(f);document.querySelectorAll('.fsw').forEach(x=>x.classList.remove('active'));el.classList.add('active');};
    fcont.appendChild(el);
  });
  const rot=document.getElementById('rot');
  rot.onclick=()=>{const on=mv.hasAttribute('auto-rotate');if(on){mv.removeAttribute('auto-rotate');rot.classList.remove('active');rot.title='Auto-rotate (off)';}else{mv.setAttribute('auto-rotate','');rot.classList.add('active');rot.title='Auto-rotate (on)';}};
  document.getElementById('reset').onclick=()=>{mv.cameraOrbit='0deg 78deg auto';mv.fieldOfView='auto';};
  document.getElementById('fs').onclick=()=>{if(!document.fullscreenElement){document.documentElement.requestFullscreen();}else{document.exitFullscreen();}};
</script>
</body>
</html>
